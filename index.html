<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Tutorial</title>
    <style>
        /* Default: Light mode variables */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #1a1a1a;
            --glass-bg: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
            --accent: #000000;
        }

        /* Dark mode overrides */
        body.dark-mode {
            --bg-color: #0f0f11;
            --text-color: #f3f3f3;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease;
            /* Subtle radial gradient background */
            background-image: radial-gradient(circle at 50% 0%, rgba(100, 100, 150, 0.05) 0%, transparent 60%);
        }

        body.dark-mode {
            background-image: radial-gradient(circle at 50% 0%, rgba(100, 100, 150, 0.15) 0%, transparent 60%);
        }

        /* Glassmorphism Navigation */
        header {
            width: 100%;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            height: 36px;
            object-fit: contain;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 900px;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-align: center;
        }

        /* Glassmorphism Video Card container */
        .video-container {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1rem;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: box-shadow 0.4s ease;
        }

        body.dark-mode .video-container {
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.3);
        }

        /* 16:9 Aspect Ratio Wrapper for the iframe */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--glass-border);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Stylized Buttons */
        button {
            background: var(--glass-bg);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.25rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        button:hover {
            background: var(--text-color);
            color: var(--bg-color);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <header>
        <img src="https://mybodyqode.vercel.app/assets/logo-CgtdQmKz.png" alt="Logo" class="logo">
        <button id="themeToggle">Toggle Theme</button>
    </header>

    <main>
        <h1>How to Get Started</h1>
        
        <div class="video-container">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/hPr-Yc92qaY" 
                    title="Platform Tutorial" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </main>

    <script>
        // Simple JavaScript functionality
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            
            // Toggle between light and dark modes
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
            });
        });
    </script>

</body>
</html>
